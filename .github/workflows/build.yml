name: Build Windows EXE (MSVC)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup MSVC (Visual Studio 2022)
        uses: microsoft/setup-msbuild@v2
      - name: Add MSVC to PATH
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Restore WebView2 SDK via NuGet
        shell: cmd
        run: |
          nuget install Microsoft.Web.WebView2 -Version 1.0.2592.51 -OutputDirectory packages -ExcludeVersion
      - name: Build EXE with MSVC (cl.exe)
        shell: cmd
        run: |
          cl.exe /std:c++17 /O2 /EHsc /W3 /MD /utf-8 ^
            /I packages\Microsoft.Web.WebView2\build\native\include ^
            main.cpp ^
            user32.lib gdi32.lib comdlg32.lib advapi32.lib ^
            gdiplus.lib ole32.lib oleaut32.lib uuid.lib ^
            shlwapi.lib comctl32.lib shell32.lib ^
            WebView2LoaderStatic.lib ^
            /Fe:pptx_editor.exe ^
            /link /LIBPATH:packages\Microsoft.Web.WebView2\build\native\x64 ^
            /SUBSYSTEM:WINDOWS /ENTRY:wWinMainCRTStartup
          echo Build successful!
          dir pptx_editor.exe
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pptx_editor-windows-x64-msvc
          path: pptx_editor.exe
          retention-days: 30
      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pptx_editor.exe
          generate_release_notes: true
