name: Build Windows EXE (MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC (Visual Studio 2022)
        uses: microsoft/setup-msbuild@v2

      - name: Add MSVC to PATH
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EXE with MSVC (cl.exe)
        shell: cmd
        run: |
          cl.exe /std:c++17 /O2 /EHsc /W3 /MD ^
            main.cpp ^
            gdiplus.lib ole32.lib oleaut32.lib uuid.lib shlwapi.lib comctl32.lib ^
            /Fe:pptx_editor.exe ^
            /link /SUBSYSTEM:WINDOWS /ENTRY:WinMainCRTStartup
          echo Build successful!
          dir pptx_editor.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pptx_editor-windows-x64-msvc
          path: pptx_editor.exe
          retention-days: 30

      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pptx_editor.exe
          generate_release_notes: true
